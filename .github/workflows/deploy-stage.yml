name: Deploy Staging to GCS

on:
  push:
    branches:
      - stage

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          PUBLIC_NOINDEX: 'true'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          token_format: 'access_token'
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Google Cloud Storage (gzip in flight)
        run: |
          echo "Deploying build output to gs://stage-landing"
          gcloud storage rsync build/ gs://stage-landing \
            --recursive \
            --delete-unmatched-destination-objects \
            --gzip-in-flight-extensions=html,css,js,json,xml,txt,svg

      - name: Set Cache Control for HTML files
        run: |
          gsutil -m setmeta -h "Cache-Control:no-cache" gs://stage-landing/**/*.html || true

      - name: Set Cache Control for immutable assets
        run: |
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://stage-landing/_app/immutable/**" || true

      - name: Set Cache Control for images
        run: |
          for ext in png jpg jpeg gif svg webp; do
            gsutil -m setmeta -h "Cache-Control:public, max-age=2592000" gs://stage-landing/images/**/*.$ext || true
          done

      - name: Set Cache Control for fonts
        run: |
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://stage-landing/fonts/**" || true
