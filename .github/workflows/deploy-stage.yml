name: Deploy Staging to GCS

on:
  push:
    branches:
      - stage

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          PUBLIC_NOINDEX: 'true'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          token_format: 'access_token'
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Pre-compress text assets for GCS delivery
        run: |
          find build -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" -o -name "*.xml" -o -name "*.txt" -o -name "*.svg" \) | while read f; do
            gzip -9n "$f" && mv "$f.gz" "$f"
          done

      - name: Deploy to Google Cloud Storage
        run: |
          echo "Deploying build output to gs://stage-landing"
          gsutil -m rsync -d -r build/ gs://stage-landing

      - name: Set gzip encoding on compressed text assets
        run: |
          for ext in html css js json xml txt svg; do
            gsutil -m setmeta -h "Content-Encoding:gzip" "gs://stage-landing/**/*.$ext" 2>/dev/null || true
            gsutil -m setmeta -h "Content-Encoding:gzip" "gs://stage-landing/*.$ext" 2>/dev/null || true
          done

      - name: Set Cache Control for HTML files
        run: |
          gsutil -m setmeta -h "Cache-Control:no-cache" gs://stage-landing/**/*.html || true

      - name: Set Cache Control for immutable assets
        run: |
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://stage-landing/_app/immutable/**" || true

      - name: Set Cache Control for images
        run: |
          for ext in png jpg jpeg gif svg webp; do
            gsutil -m setmeta -h "Cache-Control:public, max-age=2592000" gs://stage-landing/images/**/*.$ext || true
          done

      - name: Set Cache Control for fonts
        run: |
          gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://stage-landing/fonts/**" || true
